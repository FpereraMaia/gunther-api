# Platform-connected mode — requires Octopus platform to be running.
#
# Usage:
#   docker compose up -d          # start app (+ worker if enabled)
#   APP_DEBUG=true docker compose up app   # debug mode with debugpy on :5678
#
# Access: http://gunther_api.localhost  (Traefik routes it)
#
# Environment strategy:
#   .env supplies localhost-friendly defaults (works for `make dev` too).
#   The `environment:` block below overrides each key with Docker service names
#   so the container can reach platform services by their container name.

services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gunther_api.rule=Host(`gunther_api.localhost`)"
      - "traefik.http.services.gunther_api.loadbalancer.server.port=8000"
      - "prometheus_scrape=true"
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@octopus-postgres/${POSTGRES_DB}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://octopus-alloy:4317
      OTEL_SERVICE_NAME: gunther_api
      CORS_ORIGINS: '["https://gunther_api.localhost"]'
      REDIS_URL: redis://octopus-redis:6379/0
    volumes:
      - ./secrets:/workspaces/gunther_api/secrets:ro
    ports:
      - "5678:5678"   # debugpy — only active when APP_DEBUG=true
    networks: [octopus-network]
    depends_on:
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      target: runtime
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@octopus-postgres/${POSTGRES_DB}
    networks: [octopus-network]
    restart: "no"
  worker:
    build:
      context: .
      target: runtime
    command: ["arq", "app.worker.WorkerSettings"]
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@octopus-postgres/${POSTGRES_DB}
      REDIS_URL: redis://octopus-redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://octopus-alloy:4317
      OTEL_SERVICE_NAME: gunther_api
    networks: [octopus-network]
    depends_on:
      migrate:
        condition: service_completed_successfully

networks:
  octopus-network:
    external: true   # created by: octopus up / platform docker compose up
