global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: "gunther_api"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: "gunther_api"
    static_configs:
      - targets: [app:8000]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: alloy
    static_configs:
      - targets: [alloy:12345]

  - job_name: loki
    static_configs:
      - targets: [loki:3100]
    metrics_path: /metrics

  - job_name: tempo
    static_configs:
      - targets: [tempo:3200]
    metrics_path: /metrics
