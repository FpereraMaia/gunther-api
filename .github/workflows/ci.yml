name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  SERVICE_NAME: "gunther_api"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: ruff — format check
        run: uv run ruff format --check src/ tests/

      - name: ruff — lint
        run: uv run ruff check src/ tests/

      - name: mypy — type check
        run: uv run mypy src/

      - name: bandit — security scan
        run: uv run bandit -c pyproject.toml -r src/ -q

      - name: uv audit — dependency vulnerability scan
        run: uv audit

      - name: deptry — unused / missing dependency check
        run: uv run deptry src/

      - name: hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
        env:
          DATABASE_URL: "postgresql+asyncpg://placeholder/placeholder"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "ci-test-only-not-for-production"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Schema fuzz ────────────────────────────────────────────────────────────────
  schema:
    name: Schema Fuzz
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schema_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: Run Alembic migrations
        run: PYTHONPATH=src uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/schema_test

      - name: Start app in background
        run: |
          PYTHONPATH=src uv run uvicorn app.main:app \
            --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/health > /dev/null && echo "App ready" && break
            sleep 1
          done
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/schema_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: "ci-test-only-not-for-production"

      - name: Schemathesis — fuzz API against OpenAPI spec
        run: |
          uv run schemathesis run \
            http://localhost:8000/openapi.json \
            --validate-schema=true \
            --checks=all \
            --hypothesis-max-examples=50 \
            --hypothesis-seed=42

  # ── Docker build & scan ────────────────────────────────────────────────────────
  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  # ── Notify Octopus ─────────────────────────────────────────────────────────────
  notify:
    name: Notify Octopus
    runs-on: ubuntu-latest
    needs: [lint, test, schema, build]
    if: always()
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ needs.lint.result }}"   = "success" ] && \
             [ "${{ needs.test.result }}"   = "success" ] && \
             [ "${{ needs.schema.result }}" = "success" ] && \
             [ "${{ needs.build.result }}"  = "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: POST build report to Octopus
        run: |
          curl -s --max-time 10 \
            -X POST "${{ vars.OCTOPUS_API_URL }}/projects/${{ env.SERVICE_NAME }}/builds" \
            -H "Content-Type: application/json" \
            -d '{
              "status":     "${{ steps.status.outputs.result }}",
              "sha":        "${{ github.sha }}",
              "ref":        "${{ github.ref_name }}",
              "run_url":    "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
        continue-on-error: true
